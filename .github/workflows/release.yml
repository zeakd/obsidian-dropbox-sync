name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check version change
        id: version
        run: |
          CURRENT=$(jq -r .version package.json)
          PREVIOUS=$(git show HEAD~1:package.json 2>/dev/null | jq -r .version 2>/dev/null || echo "")
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          if [ "$CURRENT" != "$PREVIOUS" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip if version unchanged
        if: steps.version.outputs.changed != 'true'
        run: echo "Version unchanged (${{ steps.version.outputs.current }}), skipping release."

      - uses: oven-sh/setup-bun@v2
        if: steps.version.outputs.changed == 'true'

      - name: Set up env
        if: steps.version.outputs.changed == 'true'
        run: echo "DROPBOX_APP_KEY=${{ secrets.DROPBOX_APP_KEY }}" > .env

      - name: Install dependencies
        if: steps.version.outputs.changed == 'true'
        run: bun install --frozen-lockfile

      - name: Run tests
        if: steps.version.outputs.changed == 'true'
        run: bun test

      - name: Build
        if: steps.version.outputs.changed == 'true'
        run: bun run build

      - name: Create Release
        if: steps.version.outputs.changed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.current }}
          name: v${{ steps.version.outputs.current }}
          generate_release_notes: true
          files: |
            dist/main.js
            dist/manifest.json
            dist/styles.css
